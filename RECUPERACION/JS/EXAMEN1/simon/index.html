<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Simon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Juego Simon</h1>

<div id="game">

    <div class="row">

<script src="script.js"></script>

</body>
</html>
