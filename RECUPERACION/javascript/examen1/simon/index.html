<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Simon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Juego Simon</h1>

<div id="game">

    <div class="row">
        <div class="btn red" data-color="red"></div>
        <div class="btn green" data-color="green"></div>
    </div>

    <div class="row">
        <div class="btn blue" data-color="blue"></div>
        <div class="btn yellow" data-color="yellow"></div>
    </div>

</div>

<div class="controls">
    <button id="start">Empezar</button>
    <p id="level">Nivel: 0</p>
</div>

<script src="script.js"></script>

</body>
</html>
